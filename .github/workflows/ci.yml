name: CI

on:
    pull_request:
        branches: [master]

permissions:
    contents: read

concurrency:
    group: ci-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    static:
        name: Static checks
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: pnpm/action-setup@v6
            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - name: Type check
              run: pnpm type-check
            - name: Lint
              run: pnpm lint
            - name: Format check
              run: pnpm format:check
            - name: Unit tests
              run: pnpm test

    build:
        name: Production build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: pnpm/action-setup@v6
            - uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - name: Cache Astro build cache
              uses: actions/cache@v6
              with:
                  path: |
                      .astro
                      node_modules/.astro
                  key: astro-${{ runner.os }}-${{ hashFiles('astro/**', 'src/**', 'content/**', 'astro.config.mjs', 'pnpm-lock.yaml') }}
                  restore-keys: astro-${{ runner.os }}-
            - run: pnpm build
            - name: Verify routes, metadata and structured data
              run: pnpm check:build
            - name: Validate structured-data graph
              run: pnpm check:structured-data
            - name: Diagnose search quality setup
              run: pnpm doctor:search-quality
            - name: Verify Google Search quality
              uses: SilesianSolutions/search-quality-kit/action@v0
              with:
                  node-version-file: '.nvmrc'
                  package-manager: pnpm
                  config: search-quality.config.ts
                  summary: 'true'
                  upload-artifact: 'true'
            - name: Check internal links
              run: pnpm dlx linkinator@6.1.2 dist --recurse --skip "^https?://(?!localhost)"
