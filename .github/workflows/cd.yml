name: CD

on:
    push:
        branches:
            - master
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: 'pages'
    cancel-in-progress: false

defaults:
    run:
        shell: bash

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'

            - name: Setup PNPM
              uses: pnpm/action-setup@v6

            - name: Setup Pages
              id: pages
              uses: actions/configure-pages@v6

            - name: Restore cache
              uses: actions/cache@v6
              with:
                  path: |
                      .astro
                      node_modules/.astro
                  key: astro-${{ runner.os }}-${{ hashFiles('astro/**', 'src/**', 'content/**', 'astro.config.mjs', 'pnpm-lock.yaml') }}
                  restore-keys: |
                      astro-${{ runner.os }}-
            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build with Astro
              run: pnpm build

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: ./dist

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5

    notify:
        runs-on: ubuntu-latest
        needs: deploy
        if: "!contains(github.event.head_commit.message, '[skip notify]')"
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Notify Google via Indexing API
              env:
                  GOOGLE_JSON_KEY_FILE: ${{ secrets.GOOGLE_JSON_KEY_FILE }}
              working-directory: '.github/scripts'
              shell: bash
              run: ./google.sh

            - name: Notify Bing via URL Submission API
              env:
                  BING_API_KEY: ${{ secrets.BING_API_KEY }}
              working-directory: '.github/scripts'
              shell: bash
              run: ./bing.sh
